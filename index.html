<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛽</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Дизель Монітор — ціни на дизельне пальне в Україні: мережі АЗС, області, історія, аналітика, прогноз, новини ринку." />
    <meta name="theme-color" content="#0a0e12" />
    <title>Дизель Монітор — ціни на ДП в Україні</title>
    <script>
      // GoatCounter: сайт на hash-роутері, тож включаємо hash у шлях
      // і докидаємо перегляд при навігації всередині SPA
      window.goatcounter = {
        path: function () {
          return location.pathname + location.search + location.hash;
        },
      };
      window.addEventListener('hashchange', function () {
        if (window.goatcounter && window.goatcounter.count) {
          window.goatcounter.count({
            path: location.pathname + location.search + location.hash,
          });
        }
      });
    </script>
    <script
      data-goatcounter="https://diesel-monitor.goatcounter.com/count"
      async
      src="https://gc.zgo.at/count.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
