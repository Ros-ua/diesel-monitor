name: Збір цін (щодня)

on:
  schedule:
    # 05:40 та 11:40 UTC ≈ 08:40 і 14:40 за Києвом
    - cron: '40 5,11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Збір даних
        run: node scripts/collect.mjs
      - name: Коміт оновлених даних
        id: commit
        run: |
          git config user.name "diesel-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Дані без змін"
          else
            git commit -m "data: автооновлення цін $(date -u +%Y-%m-%d_%H:%M)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Пуш від GITHUB_TOKEN не запускає deploy.yml, тому деплоїмо тут само
  deploy:
    needs: collect
    if: needs.collect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
